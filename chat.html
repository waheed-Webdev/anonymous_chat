<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeChat Pro - Private & Public</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .theme-blue { --bg: #f0f9ff; --primary: #2563eb; --header: #1e40af; }
        body { background-color: var(--bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #chat-box { scroll-behavior: smooth; }
        .msg-animate { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .active-user { border: 2px solid #2563eb; background: #dbeafe !important; }
    </style>
</head>
<body id="main-body" class="theme-blue font-sans">

    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border-4 border-blue-500 text-center">
            <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase">Join Chatib Pro</h2>
            <div class="space-y-4">
                <input id="user-name" type="text" placeholder="Nickname" class="w-full border-2 rounded-xl p-3 outline-none focus:border-blue-500">
                <div class="flex gap-2">
                    <input id="user-location" type="text" placeholder="City/State" class="flex-1 border-2 rounded-xl p-3 outline-none">
                    <select id="user-gender" class="border-2 rounded-xl p-3 outline-none bg-white">
                        <option value="♂️">♂️ Male</option>
                        <option value="♀️">♀️ Female</option>
                    </select>
                </div>
                <button onclick="startChat()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition">START CHATTING</button>
            </div>
        </div>
    </div>

    <div id="header-bg" class="p-3 text-white shadow-lg" style="background-color: var(--header);">
        <div class="flex justify-between items-center">
            <h1 class="font-bold text-lg">🛡️ SafeChat Pro</h1>
            <div class="flex gap-2">
                <button onclick="setFilter('all')" class="bg-white/20 px-2 py-1 rounded text-[10px]">ALL</button>
                <button onclick="setFilter('♂️')" class="bg-blue-500/40 px-2 py-1 rounded text-[10px]">♂️ MEN</button>
                <button onclick="setFilter('♀️')" class="bg-pink-500/40 px-2 py-1 rounded text-[10px]">♀️ WOMEN</button>
            </div>
        </div>
    </div>

    <div id="online-list" class="bg-white border-b p-2 overflow-x-auto whitespace-nowrap flex gap-2 shadow-sm">
        </div>

    <div id="chat-status" class="bg-yellow-50 text-[10px] text-center py-1 font-bold text-yellow-700 border-b">
        📢 You are in PUBLIC ROOM (Everyone can see)
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <div class="p-4 bg-white border-t shadow-inner">
        <div class="flex items-center gap-2">
            <label for="imageInput" class="cursor-pointer text-blue-600 p-2"><i class="fas fa-paperclip text-xl"></i></label>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 border-2 rounded-full px-5 py-2 outline-none text-sm">
            <button id="send-btn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
        <button id="exit-private" class="hidden w-full mt-2 text-[10px] text-red-500 font-bold underline" onclick="exitPrivate()">Back to Public Chat</button>
    </div>

    <script type="module">
        // SCRIPT KA BAAKI HISSA AGLE MESSAGE MEIN HAI...
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, deleteDoc, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4G0ulOFI_WUSNIFim1PT7xU11vf4yF7g",
            authDomain: "anonymous-chat-7d857.firebaseapp.com",
            projectId: "anonymous-chat-7d857",
            storageBucket: "anonymous-chat-7d857.firebasestorage.app",
            messagingSenderId: "141344412785",
            appId: "1:141344412785:web:958a3c1361e385dcbcb7d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = { name: "", loc: "", gen: "" };
        let activeChat = "public"; // default room
        let currentFilter = "all";
        const imgbbKey = "8d1c34984d99e9091e7f22e50b7e5168"; // Aapki working key

        // --- AUTH & LOGIN ---
        window.startChat = async () => {
            const n = document.getElementById('user-name').value.trim();
            const l = document.getElementById('user-location').value.trim();
            const g = document.getElementById('user-gender').value;
            if(!n || !l) return alert("Nickname and Location required!");

            user = { name: n, loc: l, gen: g };
            document.getElementById('login-modal').classList.add('hidden');
            await setDoc(doc(db, "online", n), { ...user, t: serverTimestamp() });
            loadMessages();
            loadOnlineUsers();
        };

        // --- NAVIGATION & FILTERS ---
        window.setFilter = (f) => {
            currentFilter = f;
            loadOnlineUsers();
        };

        window.openPrivateChat = (targetName) => {
            if(targetName === user.name) return;
            // Private Room ID logic (alphabetical order so both users land in same room)
            activeChat = [user.name, targetName].sort().join("_");
            document.getElementById('chat-status').innerHTML = `🔒 Private Chat with <b>${targetName}</b>`;
            document.getElementById('exit-private').classList.remove('hidden');
            loadMessages();
        };

        window.exitPrivate = () => {
            activeChat = "public";
            document.getElementById('chat-status').innerHTML = `📢 You are in PUBLIC ROOM (Everyone can see)`;
            document.getElementById('exit-private').classList.add('hidden');
            loadMessages();
        };

        // --- MESSAGING ---
        async function send() {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if(!txt) return;

            await addDoc(collection(db, "messages"), {
                n: user.name, g: user.gen, l: user.loc,
                c: txt, t: serverTimestamp(),
                type: 'text', room: activeChat
            });
            input.value = "";
        }

        // --- IMAGE UPLOAD (Using your successful ImgBB method) ---
        document.getElementById('imageInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('msg-input').placeholder = "Uploading...";
            
            const formData = new FormData();
            formData.append("image", file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                const result = await res.json();
                if(result.success) {
                    await addDoc(collection(db, "messages"), {
                        n: user.name, g: user.gen, l: user.loc,
                        img: result.data.url, t: serverTimestamp(),
                        type: 'image', room: activeChat
                    });
                }
            } catch (err) { alert("Upload Failed!"); }
            document.getElementById('msg-input').placeholder = "Type a message...";
        };

        // --- REAL-TIME LISTENERS ---
        let msgUnsub;
        function loadMessages() {
            if(msgUnsub) msgUnsub();
            const q = query(collection(db, "messages"), where("room", "==", activeChat), orderBy("t", "asc"), limit(50));
            
            msgUnsub = onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const isMe = data.n === user.name;
                    const m = document.createElement('div');
                    m.className = `flex flex-col ${isMe ? 'items-end ml-auto' : 'items-start mr-auto'} max-w-[85%] msg-animate`;
                    
                    let content = data.type === 'image' 
                        ? `<img src="${data.img}" class="rounded-xl max-h-60 shadow-md border-2 border-white" onclick="window.open('${data.img}')">`
                        : `<div class="${isMe ? 'bg-blue-600 text-white' : 'bg-white text-gray-800'} p-3 rounded-2xl ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} shadow-sm border border-gray-100 text-sm font-medium">${data.c}</div>`;

                    m.innerHTML = `<span class="text-[8px] font-bold text-gray-500 uppercase px-1">${data.g} ${data.n}</span>${content}`;
                    box.appendChild(m);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function loadOnlineUsers() {
            onSnapshot(collection(db, "online"), (snap) => {
                const container = document.getElementById('online-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const userData = d.data();
                    if(currentFilter !== 'all' && userData.gen !== currentFilter) return;
                    
                    const btn = document.createElement('button');
                    btn.className = `bg-gray-100 px-3 py-1 rounded-full border text-[11px] font-bold flex items-center gap-1 hover:bg-blue-50 transition`;
                    btn.innerHTML = `<span>${userData.gen}</span> ${userData.name}`;
                    btn.onclick = () => openPrivateChat(userData.name);
                    container.appendChild(btn);
                });
            });
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
        window.onbeforeunload = () => { if(user.name) deleteDoc(doc(db, "online", user.name)); };
    </script>
</body>
</html>
